<div class="search-input">
  <nb-card>
    <nb-card-body>
      <input
        type="text"
        nbInput
        fullWidth
        [status]="termControl.valid ? 'basic' : 'danger'"
        [placeholder]="'SEARCH.PLACEHOLDER' | translate"
        autocomplete="off"
        [formControl]="termControl"
      />
    </nb-card-body>
  </nb-card>
</div>

<nb-card class="list">
  <nb-card-body>
    <nb-list>
      <nb-list-item *ngFor="let item of itemList">
        {{ item[bindLabel] }}
      </nb-list-item>
    </nb-list>
  </nb-card-body>
</nb-card>
