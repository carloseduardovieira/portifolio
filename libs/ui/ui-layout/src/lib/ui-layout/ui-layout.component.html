<div class="layout">
  <ng-content select="ui-layout-header:not([subheader])"></ng-content>
  <div class="layout-container">
    <ng-content select="ui-layout-sidebar"></ng-content>
    <div class="layout-container__content">
      <ng-content select="ui-layout-header[subheader]"></ng-content>
      <div class="layout-container__columns">
        <ng-content select="ui-layout-column"></ng-content>
      </div>
      <ng-content select="ui-layout-footer"></ng-content>
    </div>
  </div>
</div>
