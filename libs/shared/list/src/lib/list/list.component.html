<div class="search-input">
  <nb-card>
    <nb-card-body>
      <input
        type="text"
        nbInput
        fullWidth
        [status]="termControl.valid ? 'basic' : 'danger'"
        [placeholder]="placeholder | translate"
        autocomplete="off"
        [formControl]="termControl"
      />
    </nb-card-body>
  </nb-card>
</div>

<nb-card>
  <nb-card-body *ngIf="itemList.length">
    <div #containerRef class="infinity-list">
      <div
        class="search-results"
        infinite-scroll
        [infiniteScrollContainer]="containerRef"
        [infiniteScrollDistance]="infiniteScrollDistance"
        [infiniteScrollThrottle]="infiniteScrollThrottle"
        (scrolled)="onScrollDown()"
      >
        <div class="infinity-list__item" *ngFor="let item of itemList">
          <a
            class="custom-link"
            [routerLink]="['/search/users/' + item[bindLabel]]"
            routerLinkActive="router-link-active"
            >{{ item[bindLabel] }}</a
          >
        </div>
      </div>
    </div>
  </nb-card-body>
</nb-card>
